name: tests

on:
  push:
    branches: [develop, main, master, workos]
  pull_request:
    branches: [develop, main, master, workos]

jobs:
  backend:
    name: Backend (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.3', '8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Create Vite manifest stub
        run: |
          mkdir -p public/build
          printf '{"resources/js/app.ts":{"file":"assets/app.js","isEntry":true,"src":"resources/js/app.ts"},"resources/css/app.css":{"file":"assets/app.css","isEntry":true,"src":"resources/css/app.css"}}' > public/build/manifest.json

      - name: Run Pest
        run: ./vendor/bin/pest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Run Vitest
        run: npm run test:run
